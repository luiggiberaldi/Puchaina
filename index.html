<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Premium m²</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="apple-touch-icon" href="/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var rootElement = document.getElementById('root');
        if (rootElement) {
          rootElement.innerHTML = 
            '<div style="padding: 20px; color: red; font-family: sans-serif;">' +
              '<h2>Error Global Detectado</h2>' +
              '<p>La aplicación ha encontrado un error inesperado.</p>' +
              '<pre style="background: #f5f5f5; padding: 10px; border-radius: 5px; overflow: auto;">' + message + '</pre>' +
              '<button onclick="localStorage.clear(); location.reload();" style="padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer;">' +
                'Limpiar Datos y Reintentar' +
              '</button>' +
            '</div>';
        }
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
